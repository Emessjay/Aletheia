services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aletheia
      POSTGRES_PASSWORD: aletheia
      POSTGRES_DB: aletheia
    ports:
      - "5432:5432"
    volumes:
      - aletheia_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aletheia -d aletheia"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  aletheia_pgdata:
