name: Aletheia
options:
  bundleIdPrefix: org.jackporter
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.29.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  AletheiaMac:
    type: application
    platform: macOS
    sources:
      - path: Aletheia
      - path: AletheiaMac
      - path: data/Aletheia.sqlite
        buildPhase: resources
    info:
      path: AletheiaMac/Info.plist
      properties:
        CFBundleDisplayName: Aletheia
        LSApplicationCategoryType: public.app-category.reference
        NSHumanReadableCopyright: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.jackporter.aletheia.mac
        PRODUCT_NAME: Aletheia
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: AletheiaMac/Aletheia.entitlements
    dependencies:
      - package: GRDB

  AletheiaiOS:
    type: application
    platform: iOS
    sources:
      - path: Aletheia
      - path: AletheiaiOS
      - path: data/Aletheia.sqlite
        buildPhase: resources
    info:
      path: AletheiaiOS/Info.plist
      properties:
        CFBundleDisplayName: Aletheia
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait, UIInterfaceOrientationLandscapeLeft, UIInterfaceOrientationLandscapeRight]
        UISupportedInterfaceOrientations~ipad: [UIInterfaceOrientationPortrait, UIInterfaceOrientationPortraitUpsideDown, UIInterfaceOrientationLandscapeLeft, UIInterfaceOrientationLandscapeRight]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.jackporter.aletheia.ios
        PRODUCT_NAME: Aletheia
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: AletheiaiOS/Aletheia.entitlements
    dependencies:
      - package: GRDB

  AletheiaTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AletheiaTests
    dependencies:
      - target: AletheiaMac
