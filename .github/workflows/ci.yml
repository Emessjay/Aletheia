name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Postgres for the FastAPI integration suite. asyncpg + alembic talk to
    # this on localhost:5432 — same DSN the local docker-compose.yml uses,
    # so DATABASE_URL in .nimbus-test-command works unchanged.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aletheia
          POSTGRES_PASSWORD: aletheia
          POSTGRES_DB: aletheia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aletheia -d aletheia"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30

    env:
      DATABASE_URL: postgresql://aletheia:aletheia@localhost:5432/aletheia

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: server-py/requirements.txt

      - name: Install Node dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Python dependencies
        run: pip install -r server-py/requirements.txt

      - name: TypeScript project references
        run: npx tsc -b

      - name: Vitest suite
        run: npm test --silent

      - name: Apply database migrations
        working-directory: server-py
        run: alembic upgrade head

      - name: Pytest suite (FastAPI + Postgres)
        run: python -m pytest server-py -q

      - name: Frontend build
        run: npm run build
