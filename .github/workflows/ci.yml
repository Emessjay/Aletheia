name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install root dependencies
        run: npm ci --no-audit --no-fund

      - name: Vitest suite
        run: npm test

      - name: TypeScript project references
        run: npx tsc -b

      - name: Frontend build
        run: npm run build

      - name: Install server dependencies
        working-directory: server
        run: npm ci --no-audit --no-fund

      - name: Server build
        working-directory: server
        run: npm run build

      - name: Server tests
        working-directory: server
        run: npm test --if-present
